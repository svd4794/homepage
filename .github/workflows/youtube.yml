name: Update Latest Youtube Video

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/update-youtube.js

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add latest-video.json

          git diff --cached --quiet || git commit -m "Update latest video"

          git push
